syntax = "proto3";

package shorturl;

option go_package = "mediahub/services/shorturl/proto";

// ShortUrl 短链接服务
service ShortUrl {
  // GetShortUrl 根据原始 URL 生成短链接
  rpc GetShortUrl(Url) returns (Url);
  // GetOriginalUrl 根据短链接还原原始 URL
  rpc GetOriginalUrl(ShortKey) returns (Url);
}

message Url {
  string url = 1;
  int64 userID = 2;
  bool isPublic = 3;

}

message ShortKey {
  string key = 1;
  int64 userID = 2;
  bool isPublic = 3;
}


